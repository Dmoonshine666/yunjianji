<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云笺记 - 云上一张纸</title>
    <meta name="description" content="云笺记是一款云端笔记本，支持笔记集、富文本编辑、PDF 导出，轻挥笔墨，记录流年。">
    <meta name="theme-color" content="#8B4513">
    <meta property="og:type" content="website">
    <meta property="og:title" content="云笺记 - 云上一张纸">
    <meta property="og:description" content="云端笔记：笔记集、富文本、PDF 分享。轻挥笔墨，记录流年。">
    <meta property="og:image" content="https://s41.ax1x.com/2026/03/24/peMVC4O.png">
    <meta property="og:locale" content="zh_CN">
    <link rel="icon" href="https://s41.ax1x.com/2026/03/24/peMVC4O.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="#main-content" class="skip-link">跳到主要内容</a>
    <div class="container">
        <header>
            <div>
                <h1>云笺记</h1>
                <p>轻挥笔墨，记录流年</p>
            </div>
            <div class="user-actions" id="userActions">
                <button type="button" class="btn btn-primary" id="loginBtn">登录</button>
                <button type="button" class="btn btn-secondary" id="registerBtn">注册</button>
                <button type="button" class="btn btn-secondary" id="cursorPrefBtn" aria-pressed="false">系统光标</button>
            </div>
        </header>
        <main id="main-content" class="main">
            <div class="sidebar">
                <h3>我的笔记集</h3>
                <div class="create-notebook">
                    <input type="text" id="newNotebookName" placeholder="新笔记集名称" disabled aria-label="新笔记集名称">
                    <button type="button" class="btn btn-primary" id="createNotebookBtn" disabled>创建</button>
                </div>
                <div class="notebook-list-container">
                    <ul class="notebook-list" id="notebookList"></ul>
                </div>
            </div>
            <div class="content">
                <div id="contentArea">
                    <div class="empty-state">
                        <h3>请选择或创建笔记集</h3>
                        <p>登录后即可开始创作</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <div class="debug-panel" id="debugPanel"></div>

    <div class="modal-overlay" id="loginModal" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
        <div class="modal">
            <button type="button" class="modal-close" id="closeLoginBtn" aria-label="关闭登录对话框">×</button>
            <h2 class="modal-title" id="loginModalTitle">登录</h2>
            <div class="form-group">
                <label class="form-label" for="loginEmail">邮箱</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱" autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label" for="loginPassword">密码</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-primary" style="flex:1" id="doLoginBtn">登录</button>
                <button type="button" class="btn btn-secondary" style="flex:1" id="cancelLoginBtn">取消</button>
            </div>
            <div class="form-switch">
                还没有账号？<a href="#" id="toRegisterLink">立即注册</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="registerModal" role="dialog" aria-modal="true" aria-labelledby="registerModalTitle">
        <div class="modal">
            <button type="button" class="modal-close" id="closeRegisterBtn" aria-label="关闭注册对话框">×</button>
            <h2 class="modal-title" id="registerModalTitle">注册</h2>
            <div class="form-group">
                <label class="form-label" for="registerUsername">用户名</label>
                <input type="text" class="form-input" id="registerUsername" placeholder="3-16 位字符" autocomplete="nickname">
            </div>
            <div class="form-group">
                <label class="form-label" for="registerEmail">邮箱</label>
                <input type="email" class="form-input" id="registerEmail" placeholder="请输入有效邮箱" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="registerPassword">密码</label>
                <input type="password" class="form-input" id="registerPassword" placeholder="6-16 位字符" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="form-label" for="registerConfirmPassword">确认密码</label>
                <input type="password" class="form-input" id="registerConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-primary" style="flex:1" id="doRegisterBtn">注册</button>
                <button type="button" class="btn btn-secondary" style="flex:1" id="cancelRegisterBtn">取消</button>
            </div>
            <div class="form-switch">
                已有账号？<a href="#" id="toLoginLink">立即登录</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="fileEditModal" role="dialog" aria-modal="true" aria-labelledby="fileEditModalTitle">
        <div class="modal">
            <button type="button" class="modal-close" id="closeFileEditBtn" aria-label="关闭文件备注对话框">×</button>
            <h2 class="modal-title" id="fileEditModalTitle">文件备注</h2>
            <div class="form-group">
                <label class="form-label" for="fileEditName">显示名称</label>
                <input type="text" class="form-input" id="fileEditName" placeholder="输入文件显示名称">
            </div>
            <div class="form-group">
                <label class="form-label" for="fileEditRemark">备注说明</label>
                <textarea class="form-textarea" id="fileEditRemark" placeholder="输入备注信息（可选）"></textarea>
            </div>
            <div class="form-actions">
                <div class="form-actions-left">
                    <button type="button" class="btn btn-open" id="openFileBtn" style="flex:1">📂 打开文件</button>
                </div>
                <div class="form-actions-right">
                    <button type="button" class="btn btn-primary" id="saveFileEditBtn" style="flex:1">保存修改</button>
                    <button type="button" class="btn btn-secondary" id="cancelFileEditBtn">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
