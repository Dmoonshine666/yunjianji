<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云笺记 - 古风云端笔记</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f0e6;
            color: #333;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 L100,100 M100,0 L0,100" stroke="%23e6d8c7" stroke-width="0.5" fill="none"/></svg>');
            background-size: 100px;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 20px; }
        header {
            background-color: #fff8e8;
            color: #8B4513;
            padding: 25px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 2px solid #c37e7ed1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-family: "STKaiti", "KaiTi", serif; font-size: 2.5rem; letter-spacing: 4px; }
        header p { font-family: "STKaiti", "KaiTi", serif; opacity: 0.8; }
        .user-actions { display: flex; gap: 10px; }
        
        .toast {
            position: fixed; top: 60px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            background-color: rgba(51, 51, 51, 0.9);
            color: #fff;
            border-radius: 6px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
        }
        .toast.show { opacity: 1; }
        .toast.error { background-color: rgba(178, 34, 34, 0.9); }
        .toast.info { background-color: rgba(51, 102, 153, 0.9); }

        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal {
            background: #fff8e8;
            border: 2px solid #c85a5a;
            border-radius: 10px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        .modal-close {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none;
            font-size: 1.5rem; color: #8B4513;
            cursor: pointer;
        }
        .modal-title {
            font-family: "STKaiti", "KaiTi", serif;
            color: #8B4513;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #d2b48c;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 15px; }
        .form-label {
            display: block; margin-bottom: 5px;
            color: #8B4513; font-family: "STKaiti", "KaiTi", serif;
        }
        .form-input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            background: #fff;
        }
        .form-input:focus {
            outline: none;
            border-color: #c85a5a;
            box-shadow: 0 0 0 2px rgba(200, 90, 90, 0.2);
        }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .form-switch {
            text-align: center; margin-top: 15px;
            color: #8B4513; font-family: "STKaiti", "KaiTi", serif;
        }
        .form-switch a { color: #c85a5a; text-decoration: none; cursor: pointer; }
        .form-switch a:hover { text-decoration: underline; }

        .main { display: flex; gap: 20px; min-height: calc(100vh - 180px); }
        .sidebar {
            width: 290px;
            background: #fff8e8;
            border: 2px solid #d2b48c;
            border-radius: 10px;
            padding: 15px;
        }
        .sidebar h3 {
            font-family: "STKaiti", "KaiTi", serif;
            color: #8B4513;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #d2b48c;
        }
        .create-notebook { display: flex; gap: 10px; margin-bottom: 20px; }
        .create-notebook input {
            flex: 1; padding: 8px 12px;
            border: 1px solid #d2b48c;
            border-radius: 6px;
            font-family: "STKaiti", "KaiTi", serif;
        }
        .notebook-list { list-style: none; }
        .notebook-list-container {
            flex: 1;
            overflow-y: auto;
            max-height: 500px;
        }
        .notebook-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #fff;
            border: 2px solid #e6d8c7;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: "STKaiti", "KaiTi", serif;
        }
        .notebook-item:hover { background: #f9f3e6; }
        .notebook-item.active {
            background: #f5e8d5;
            border-color: #c85a5a;
        }
        .notebook-name {
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .notebook-actions { display: flex; gap: 5px; }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-primary {
            background: linear-gradient(135deg, #c85a5a, #a04040);
            color: #fff;
        }
        .btn-danger {
            background: linear-gradient(135deg, #cd3b3b, #c22e2e);
            color: #fff;
        }
        .btn-edit {
            background: linear-gradient(135deg, #d6b257, #e2b951);
            color: #fff;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #f5f0e6, #e6d8c7);
            color: #8B4513;
            border: 1px solid #d2b48c;
        }

        .content {
            flex: 1;
            background: #fff8e8;
            border: 2px solid #d2b48c;
            border-radius: 10px;
            padding: 20px;
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d2b48c;
        }
        .note-header h3 { font-family: "STKaiti", "KaiTi", serif; color: #8B4513; }
        .note-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .note-card {
            background: #fff;
            border: 1px solid #e6d8c7;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .note-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .note-card h4 {
            font-family: "STKaiti", "KaiTi", serif;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .note-card p {
            font-size: 0.9rem;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .note-time { font-size: 0.8rem; color: #999; margin: 10px 0; }
        .note-actions { display: flex; gap: 5px; }

        .editor-title {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 1.3rem;
            font-family: "STKaiti", "KaiTi", serif;
        }
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            background: #f9f3e6;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .toolbar-btn {
            width: 30px; height: 30px;
            border: 1px solid #d2b48c;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar-btn:hover { background: #f5e8d5; }
        .toolbar-btn.active { background: #e6d8c7; }
        .editor-content {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            background: #fff;
            font-size: 1rem;
            line-height: 1.8;
        }
        .editor-content:focus {
            outline: none;
            border-color: #c85a5a;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-family: "STKaiti", "KaiTi", serif;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .loading::after {
            content: "";
            width: 30px; height: 30px;
            border: 3px solid #d2b48c;
            border-top-color: #c85a5a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; }
            header { flex-direction: column; gap: 15px; text-align: center; }
            .user-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>云笺记</h1>
                <p>轻挥笔墨，记录流年</p>
            </div>
            <div class="user-actions" id="userActions">
                <button class="btn btn-primary" onclick="showModal('login')">登录</button>
                <button class="btn btn-secondary" onclick="showModal('register')">注册</button>
            </div>
        </header>
        <div class="main">
            <div class="sidebar">
                <h3>我的笔记集</h3>
                <div class="create-notebook">
                    <input type="text" id="newNotebookName" placeholder="新笔记集名称" disabled>
                    <button class="btn btn-primary" id="createNotebookBtn" disabled>+ 创建</button>
                </div>
                <div class="notebook-list-container">
                    <ul class="notebook-list" id="notebookList"></ul>
                </div>
            </div>
            <div class="content">
                <div id="contentArea">
                    <div class="empty-state">
                        <h3>请选择或创建笔记集</h3>
                        <p>登录后即可开始创作</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="modal-close" onclick="hideModal('login')">×</button>
            <h2 class="modal-title">登录</h2>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" style="flex:1" id="doLoginBtn" onclick="handleLogin()">登录</button>
                <button class="btn btn-secondary" style="flex:1" onclick="hideModal('login')">取消</button>
            </div>
            <div class="form-switch">
                还没有账号？<a onclick="switchModal('login', 'register')">立即注册</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <button class="modal-close" onclick="hideModal('register')">×</button>
            <h2 class="modal-title">注册</h2>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="registerUsername" placeholder="3-16位字符">
            </div>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="registerEmail" placeholder="请输入有效邮箱">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="registerPassword" placeholder="6-16位字符">
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="registerConfirmPassword" placeholder="再次输入密码">
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" style="flex:1" id="doRegisterBtn" onclick="handleRegister()">注册</button>
                <button class="btn btn-secondary" style="flex:1" onclick="hideModal('register')">取消</button>
            </div>
            <div class="form-switch">
                已有账号？<a onclick="switchModal('register', 'login')">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const CONFIG = {
            supabaseUrl: 'https://zeiwdwplhgcpedhoxxqd.supabase.co',
            supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplaXdkd3BsaGdjcGVkaG94eHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTk5NjIsImV4cCI6MjA4OTA5NTk2Mn0.R4sBgsv--4WS9Pp230Y3Qhm3efHw2itzRaHgaw856VA'
        };

        // ========== 全局状态 ==========
        let supabase = null;
        let currentUser = null;
        let currentNotebookId = null;
        let currentNoteId = null;
        let autoSaveTimer = null;

        // ========== 初始化 ==========
        function init() {
            // 初始化 Supabase
            if (window.supabase) {
                supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
                console.log('Supabase 初始化成功');
            } else {
                showToast('系统加载失败，请刷新页面', 'error');
                return;
            }
            
            // 检查登录状态
            checkAuth();
            
            // 绑定全局事件
            bindGlobalEvents();
        }

        // ========== 认证相关 ==========
        async function checkAuth() {
            if (!supabase) return;
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    currentUser = session.user;
                    updateUIForLoggedIn();
                    loadNotebooks();
                } else {
                    updateUIForLoggedOut();
                }
            } catch (err) {
                console.error('检查登录状态失败:', err);
                updateUIForLoggedOut();
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const btn = document.getElementById('doLoginBtn');

            if (!email || !password) {
                showToast('请填写邮箱和密码', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;
                
                currentUser = data.user;
                showToast('登录成功！');
                hideModal('login');
                updateUIForLoggedIn();
                loadNotebooks();
                
                // 清空表单
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            } catch (err) {
                showToast('登录失败: ' + getFriendlyError(err.message), 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        async function handleRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
            const btn = document.getElementById('doRegisterBtn');

            // 验证
            if (!username || username.length < 3 || username.length > 16) {
                showToast('用户名需3-16位字符', 'error');
                return;
            }
            if (!email || !isValidEmail(email)) {
                showToast('请输入有效邮箱', 'error');
                return;
            }
            if (!password || password.length < 6 || password.length > 16) {
                showToast('密码需6-16位字符', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showToast('两次密码不一致', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: { username: username }
                    }
                });

                if (error) throw error;

                if (data.user) {
                    showToast('注册成功！请查收邮箱验证', 'info');
                    hideModal('register');
                    
                    // 清空表单
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('registerConfirmPassword').value = '';
                }
            } catch (err) {
                showToast('注册失败: ' + getFriendlyError(err.message), 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }

        async function handleLogout() {
            if (!supabase) return;
            try {
                await supabase.auth.signOut();
                currentUser = null;
                currentNotebookId = null;
                currentNoteId = null;
                showToast('已退出登录');
                updateUIForLoggedOut();
                clearContent();
            } catch (err) {
                showToast('退出失败', 'error');
            }
        }

        function updateUIForLoggedIn() {
            const username = currentUser.user_metadata?.username || currentUser.email?.split('@')[0] || '用户';
            document.getElementById('userActions').innerHTML = `
                <span style="color:#8B4513;font-family:'STKaiti';margin-right:10px;">欢迎，${username}</span>
                <button class="btn btn-danger" onclick="handleLogout()">退出</button>
            `;
            document.getElementById('newNotebookName').disabled = false;
            document.getElementById('createNotebookBtn').disabled = false;
        }

        function updateUIForLoggedOut() {
            document.getElementById('userActions').innerHTML = `
                <button class="btn btn-primary" onclick="showModal('login')">登录</button>
                <button class="btn btn-secondary" onclick="showModal('register')">注册</button>
            `;
            document.getElementById('newNotebookName').disabled = true;
            document.getElementById('createNotebookBtn').disabled = true;
        }

        // ========== 笔记集相关 ==========
        async function loadNotebooks() {
            if (!currentUser || !supabase) return;

            const list = document.getElementById('notebookList');
            list.innerHTML = '<div class="loading"></div>';

            try {
                const { data, error } = await supabase
                    .from('notebooks')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    list.innerHTML = '<li class="empty-state">暂无笔记集，请创建</li>';
                } else {
                    list.innerHTML = data.map(nb => `
                        <li class="notebook-item ${currentNotebookId === nb.id ? 'active' : ''}" 
                            data-id="${nb.id}" onclick="selectNotebook('${nb.id}')">
                            <span class="notebook-name">${escapeHtml(nb.name)}</span>
                            <div class="notebook-actions">
                                <button class="btn btn-edit" onclick="event.stopPropagation(); editNotebook('${nb.id}', '${escapeHtml(nb.name)}')">改</button>
                                <button class="btn btn-danger" onclick="event.stopPropagation(); deleteNotebook('${nb.id}')">删</button>
                            </div>
                        </li>
                    `).join('');
                }
            } catch (err) {
                list.innerHTML = `<li class="empty-state" style="color:red">加载失败: ${err.message}</li>`;
            }
        }

        async function createNotebook() {
            const input = document.getElementById('newNotebookName');
            const btn = document.getElementById('createNotebookBtn');
            const name = input.value.trim();

            if (!name) {
                showToast('请输入笔记集名称', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '创建中...';

            try {
                const { error } = await supabase
                    .from('notebooks')
                    .insert([{
                        name: name,
                        user_id: currentUser.id
                    }]);

                if (error) throw error;

                input.value = '';
                showToast('创建成功');
                loadNotebooks();
            } catch (err) {
                showToast('创建失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '+ 创建';
            }
        }

        async function selectNotebook(notebookId) {
            currentNotebookId = notebookId;
            currentNoteId = null;
            
            // 更新选中状态
            document.querySelectorAll('.notebook-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === notebookId);
            });

            loadNotes(notebookId);
        }

        async function loadNotes(notebookId) {
            if (!supabase) return;

            const content = document.getElementById('contentArea');
            content.innerHTML = '<div class="loading"></div>';

            try {
                // 获取笔记集信息
                const { data: notebook, error: nbError } = await supabase
                    .from('notebooks')
                    .select('name')
                    .eq('id', notebookId)
                    .single();

                if (nbError) throw nbError;

                // 获取笔记列表
                const { data: notes, error } = await supabase
                    .from('notes')
                    .select('*')
                    .eq('notebook_id', notebookId)
                    .order('updated_at', { ascending: false });

                if (error) throw error;

                content.innerHTML = `
                    <div class="note-header">
                        <h3>${escapeHtml(notebook.name)}</h3>
                        <button class="btn btn-primary" onclick="createNote()">+ 新建笔记</button>
                    </div>
                    <div class="note-list">
                        ${notes.length === 0 ? 
                            '<div class="empty-state" style="grid-column:1/-1">暂无笔记</div>' :
                            notes.map(note => `
                                <div class="note-card" onclick="editNote('${note.id}')">
                                    <h4>${escapeHtml(note.title || '无标题')}</h4>
                                    <p>${escapeHtml((note.content || '').replace(/<[^>]*>/g, '').substring(0, 100))}</p>
                                    <div class="note-time">${formatDate(note.updated_at)}</div>
                                    <div class="note-actions">
                                        <button class="btn btn-edit" onclick="event.stopPropagation(); editNote('${note.id}')">编辑</button>
                                        <button class="btn btn-danger" onclick="event.stopPropagation(); deleteNote('${note.id}')">删除</button>
                                    </div>
                                </div>
                            `).join('')
                        }
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `<div class="empty-state" style="color:red">加载失败: ${err.message}</div>`;
            }
        }

        // ========== 笔记编辑相关 ==========
        function createNote() {
            currentNoteId = null;
            showEditor('', '');
        }

        async function editNote(noteId) {
            if (!supabase) return;

            try {
                const { data, error } = await supabase
                    .from('notes')
                    .select('title, content')
                    .eq('id', noteId)
                    .single();

                if (error) throw error;

                currentNoteId = noteId;
                showEditor(data.title || '', data.content || '');
            } catch (err) {
                showToast('加载笔记失败', 'error');
            }
        }

        function showEditor(title, content) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="note-header">
                    <h3>${currentNoteId ? '编辑笔记' : '新建笔记'}</h3>
                    <div>
                        <button class="btn btn-primary" onclick="saveNote()">保存</button>
                        <button class="btn btn-secondary" onclick="loadNotes('${currentNotebookId}')">取消</button>
                    </div>
                </div>
                <input type="text" class="editor-title" id="noteTitle" placeholder="标题" value="${escapeHtml(title)}">
                <div class="editor-toolbar">
                    <button class="toolbar-btn" onclick="execCmd('bold')"><b>B</b></button>
                    <button class="toolbar-btn" onclick="execCmd('italic')"><i>I</i></button>
                    <button class="toolbar-btn" onclick="execCmd('underline')"><u>U</u></button>
                    <button class="toolbar-btn" onclick="execCmd('justifyLeft')">左</button>
                    <button class="toolbar-btn" onclick="execCmd('justifyCenter')">中</button>
                    <button class="toolbar-btn" onclick="execCmd('justifyRight')">右</button>
                    <input type="color" id="fontColor" onchange="execCmd('foreColor', this.value)" style="width:30px;height:30px;border:none;">
                    <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="insertImage(this)">
                    <button class="toolbar-btn" onclick="document.getElementById('imageUpload').click()">图</button>
                </div>
                <div class="editor-content" id="noteContent" contenteditable="true">${content}</div>
            `;
        }

        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
            document.getElementById('noteContent').focus();
        }

        function insertImage(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.style.maxWidth = '100%';
                
                const content = document.getElementById('noteContent');
                content.focus();
                
                const selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    range.insertNode(img);
                } else {
                    content.appendChild(img);
                }
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        async function saveNote() {
            if (!supabase) return;

            const title = document.getElementById('noteTitle').value.trim() || '无标题';
            const content = document.getElementById('noteContent').innerHTML;
            const btn = event.target;

            if (!content.trim()) {
                showToast('内容不能为空', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '保存中...';

            try {
                if (currentNoteId) {
                    // 更新
                    const { error } = await supabase
                        .from('notes')
                        .update({
                            title: title,
                            content: content,
                            updated_at: new Date()
                        })
                        .eq('id', currentNoteId)
                        .eq('user_id', currentUser.id);

                    if (error) throw error;
                    showToast('更新成功');
                } else {
                    // 新建
                    const { error } = await supabase
                        .from('notes')
                        .insert([{
                            title: title,
                            content: content,
                            notebook_id: currentNotebookId,
                            user_id: currentUser.id
                        }]);

                    if (error) throw error;
                    showToast('创建成功');
                }

                loadNotes(currentNotebookId);
            } catch (err) {
                showToast('保存失败: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '保存';
            }
        }

        async function deleteNote(noteId) {
            if (!confirm('确定删除此笔记？')) return;
            if (!supabase) return;

            try {
                const { error } = await supabase
                    .from('notes')
                    .delete()
                    .eq('id', noteId)
                    .eq('user_id', currentUser.id);

                if (error) throw error;
                showToast('删除成功');
                loadNotes(currentNotebookId);
            } catch (err) {
                showToast('删除失败', 'error');
            }
        }

        async function editNotebook(notebookId, oldName) {
            const newName = prompt('修改笔记集名称:', oldName);
            if (!newName || newName === oldName) return;

            try {
                const { error } = await supabase
                    .from('notebooks')
                    .update({ name: newName, updated_at: new Date() })
                    .eq('id', notebookId)
                    .eq('user_id', currentUser.id);

                if (error) throw error;
                showToast('修改成功');
                loadNotebooks();
            } catch (err) {
                showToast('修改失败', 'error');
            }
        }

        async function deleteNotebook(notebookId) {
            if (!confirm('确定删除？此操作将删除该笔记集下所有笔记！')) return;
            if (!supabase) return;

            try {
                // 先删除笔记
                await supabase
                    .from('notes')
                    .delete()
                    .eq('notebook_id', notebookId)
                    .eq('user_id', currentUser.id);

                // 再删除笔记集
                const { error } = await supabase
                    .from('notebooks')
                    .delete()
                    .eq('id', notebookId)
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                if (currentNotebookId === notebookId) {
                    currentNotebookId = null;
                    clearContent();
                }
                showToast('删除成功');
                loadNotebooks();
            } catch (err) {
                showToast('删除失败', 'error');
            }
        }

        // ========== 工具函数 ==========
        function showModal(type) {
            document.getElementById(type + 'Modal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function hideModal(type) {
            document.getElementById(type + 'Modal').classList.remove('show');
            document.body.style.overflow = '';
        }

        function switchModal(from, to) {
            hideModal(from);
            setTimeout(() => showModal(to), 300);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function clearContent() {
            document.getElementById('contentArea').innerHTML = `
                <div class="empty-state">
                    <h3>请选择或创建笔记集</h3>
                    <p>登录后即可开始创作</p>
                </div>
            `;
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        function getFriendlyError(message) {
            if (message.includes('Invalid login')) return '邮箱或密码错误';
            if (message.includes('Email')) return '邮箱格式问题';
            if (message.includes('Password')) return '密码强度不足';
            if (message.includes('Network')) return '网络连接失败';
            if (message.includes('already')) return '该邮箱已注册';
            return message;
        }

        function bindGlobalEvents() {
            // 创建笔记集
            document.getElementById('createNotebookBtn').addEventListener('click', createNotebook);
            
            // 回车创建笔记集
            document.getElementById('newNotebookName').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') createNotebook();
            });

            // 回车登录
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            // 回车注册
            document.getElementById('registerConfirmPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRegister();
            });

            // 点击遮罩关闭弹窗
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove('show');
                        document.body.style.overflow = '';
                    }
                });
            });
        }

        // ========== 启动 ==========
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
