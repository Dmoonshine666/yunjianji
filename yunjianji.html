<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云笺记 - 古风云端笔记</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background-color: #f5f0e6;
            color: #333;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 L100,100 M100,0 L0,100" stroke="%23e6d8c7" stroke-width="0.5" fill="none"/></svg>');
            background-size: 100px;
        }
        .container { max-width: 1280px; margin: 0 auto; padding: 20px; }
        header {
            background-color: #fff8e8;
            color: #8B4513;
            padding: 25px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 2px solid #c37e7ed1;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-family: "STKaiti", "KaiTi", serif; font-size: 2.5rem; letter-spacing: 4px; }
        header p { font-family: "STKaiti", "KaiTi", serif; opacity: 0.8; }
        .user-actions { display: flex; gap: 10px; }
        
        .toast {
            position: fixed; top: 60px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 20px;
            background-color: rgba(51, 51, 51, 0.9);
            color: #fff;
            border-radius: 6px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 80%;
        }
        .toast.show { opacity: 1; }
        .toast.error { background-color: rgba(178, 34, 34, 0.9); }
        .toast.info { background-color: rgba(51, 102, 153, 0.9); }
        .toast.success { background-color: rgba(34, 139, 34, 0.9); }

        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal {
            background: #fff8e8;
            border: 2px solid #c85a5a;
            border-radius: 10px;
            padding: 25px;
            width: 100%;
            max-width: 450px;
            position: relative;
        }
        .modal-close {
            position: absolute; top: 15px; right: 15px;
            background: none; border: none;
            font-size: 1.5rem; color: #8B4513;
            cursor: pointer;
        }
        .modal-title {
            font-family: "STKaiti", "KaiTi", serif;
            color: #8B4513;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #d2b48c;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 15px; }
        .form-label {
            display: block; margin-bottom: 5px;
            color: #8B4513; font-family: "STKaiti", "KaiTi", serif;
        }
        .form-input {
            width: 100%; padding: 10px 12px;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            background: #fff;
        }
        .form-input:focus {
            outline: none;
            border-color: #c85a5a;
            box-shadow: 0 0 0 2px rgba(200, 90, 90, 0.2);
        }
        .form-actions { display: flex; gap: 10px; margin-top: 20px; }
        .form-switch {
            text-align: center; margin-top: 15px;
            color: #8B4513; font-family: "STKaiti", "KaiTi", serif;
        }
        .form-switch a { color: #c85a5a; text-decoration: none; cursor: pointer; }
        .form-switch a:hover { text-decoration: underline; }

        .main { display: flex; gap: 20px; min-height: calc(100vh - 180px); }
        .sidebar {
            width: 290px;
            background: #fff8e8;
            border: 2px solid #d2b48c;
            border-radius: 10px;
            padding: 15px;
        }
        .sidebar h3 {
            font-family: "STKaiti", "KaiTi", serif;
            color: #8B4513;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #d2b48c;
        }
        .create-notebook { display: flex; gap: 10px; margin-bottom: 20px; }
        .create-notebook input {
            flex: 1; padding: 8px 12px;
            border: 1px solid #d2b48c;
            border-radius: 6px;
            font-family: "STKaiti", "KaiTi", serif;
        }
        .notebook-list { list-style: none; }
        .notebook-list-container {
            flex: 1;
            overflow-y: auto;
            max-height: 500px;
        }
        .notebook-item {
            padding: 10px 12px;
            margin-bottom: 8px;
            background: #fff;
            border: 2px solid #e6d8c7;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: "STKaiti", "KaiTi", serif;
        }
        .notebook-item:hover { background: #f9f3e6; }
        .notebook-item.active {
            background: #f5e8d5;
            border-color: #c85a5a;
        }
        .notebook-name {
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .notebook-actions { display: flex; gap: 5px; }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: "STKaiti", "KaiTi", serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .btn-primary {
            background: linear-gradient(135deg, #c85a5a, #a04040);
            color: #fff;
        }
        .btn-danger {
            background: linear-gradient(135deg, #cd3b3b, #c22e2e);
            color: #fff;
        }
        .btn-edit {
            background: linear-gradient(135deg, #d6b257, #e2b951);
            color: #fff;
        }
        .btn-secondary {
            background: linear-gradient(135deg, #f5f0e6, #e6d8c7);
            color: #8B4513;
            border: 1px solid #d2b48c;
        }

        .content {
            flex: 1;
            background: #fff8e8;
            border: 2px solid #d2b48c;
            border-radius: 10px;
            padding: 20px;
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #d2b48c;
        }
        .note-header h3 { font-family: "STKaiti", "KaiTi", serif; color: #8B4513; }
        .note-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .note-card {
            background: #fff;
            border: 1px solid #e6d8c7;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .note-card:hover {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .note-card h4 {
            font-family: "STKaiti", "KaiTi", serif;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .note-card p {
            font-size: 0.9rem;
            color: #666;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .note-time { font-size: 0.8rem; color: #999; margin: 10px 0; }
        .note-actions { display: flex; gap: 5px; }

        .editor-title {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 1.3rem;
            font-family: "STKaiti", "KaiTi", serif;
        }
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            background: #f9f3e6;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .toolbar-btn {
            width: 30px; height: 30px;
            border: 1px solid #d2b48c;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        .toolbar-btn:hover { background: #f5e8d5; }
        .toolbar-btn.active { background: #e6d8c7; }
        .editor-content {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 1px solid #d2b48c;
            border-radius: 8px;
            background: #fff;
            font-size: 1rem;
            line-height: 1.8;
        }
        .editor-content:focus {
            outline: none;
            border-color: #c85a5a;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            font-family: "STKaiti", "KaiTi", serif;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .loading::after {
            content: "";
            width: 30px; height: 30px;
            border: 3px solid #d2b48c;
            border-top-color: #c85a5a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 调试面板 */
        .debug-panel {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #222;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 99999;
            display: none;
        }
        .debug-panel.show { display: block; }

        @media (max-width: 768px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; }
            header { flex-direction: column; gap: 15px; text-align: center; }
            .user-actions { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>云笺记</h1>
                <p>轻挥笔墨，记录流年</p>
            </div>
            <div class="user-actions" id="userActions">
                <button class="btn btn-primary" id="loginBtn">登录</button>
                <button class="btn btn-secondary" id="registerBtn">注册</button>
            </div>
        </header>
        <div class="main">
            <div class="sidebar">
                <h3>我的笔记集</h3>
                <div class="create-notebook">
                    <input type="text" id="newNotebookName" placeholder="新笔记集名称" disabled>
                    <button class="btn btn-primary" id="createNotebookBtn" disabled>+ 创建</button>
                </div>
                <div class="notebook-list-container">
                    <ul class="notebook-list" id="notebookList"></ul>
                </div>
            </div>
            <div class="content">
                <div id="contentArea">
                    <div class="empty-state">
                        <h3>请选择或创建笔记集</h3>
                        <p>登录后即可开始创作</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <div class="debug-panel" id="debugPanel"></div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="modal-close" id="closeLoginBtn">×</button>
            <h2 class="modal-title">登录</h2>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" style="flex:1" id="doLoginBtn">登录</button>
                <button class="btn btn-secondary" style="flex:1" id="cancelLoginBtn">取消</button>
            </div>
            <div class="form-switch">
                还没有账号？<a id="toRegisterLink">立即注册</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="registerModal">
        <div class="modal">
            <button class="modal-close" id="closeRegisterBtn">×</button>
            <h2 class="modal-title">注册</h2>
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" class="form-input" id="registerUsername" placeholder="3-16 位字符">
            </div>
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-input" id="registerEmail" placeholder="请输入有效邮箱">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="registerPassword" placeholder="6-16 位字符">
            </div>
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-input" id="registerConfirmPassword" placeholder="再次输入密码">
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" style="flex:1" id="doRegisterBtn">注册</button>
                <button class="btn btn-secondary" style="flex:1" id="cancelRegisterBtn">取消</button>
            </div>
            <div class="form-switch">
                已有账号？<a id="toLoginLink">立即登录</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        'use strict';
        
        // ========== 配置 ==========
        var CONFIG = {
            supabaseUrl: 'https://zeiwdwplhgcpedhoxxqd.supabase.co',
            supabaseKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplaXdkd3BsaGdjcGVkaG94eHFkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MTk5NjIsImV4cCI6MjA4OTA5NTk2Mn0.R4sBgsv--4WS9Pp230Y3Qhm3efHw2itzRaHgaw856VA'
        };

        // ========== 全局状态 ==========
        var appState = {
            supabase: null,
            currentUser: null,
            currentNotebookId: null,
            currentNoteId: null
        };

        // ========== 调试日志 ==========
        function debug(msg) {
            var panel = document.getElementById('debugPanel');
            var time = new Date().toLocaleTimeString();
            panel.innerHTML += '[' + time + '] ' + msg + '<br>';
            panel.scrollTop = panel.scrollHeight;
            console.log('[DEBUG]', msg);
        }

        // ========== 工具函数 ==========
        function showToast(message, type) {
            type = type || 'success';
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#039;');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            var date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }

        function getFriendlyError(message) {
            if (!message) return '操作失败';
            if (message.includes('Invalid login')) return '邮箱或密码错误';
            if (message.includes('Email')) return '邮箱格式问题';
            if (message.includes('Password')) return '密码强度不足';
            if (message.includes('Network')) return '网络连接失败';
            if (message.includes('already')) return '该邮箱已注册';
            if (message.includes('relation')) return '数据库表未配置';
            if (message.includes('permission') || message.includes('RLS')) return '权限不足，请检查 RLS 策略';
            if (message.includes('user_id')) return '用户信息不完整';
            if (message.includes('JWT')) return '登录已过期，请重新登录';
            return message;
        }

        // ========== 模态框函数 ==========
        function showModal(type) {
            var modal = document.getElementById(type + 'Modal');
            if (modal) {
                modal.classList.add('show');
                document.body.style.overflow = 'hidden';
            }
        }

        function hideModal(type) {
            var modal = document.getElementById(type + 'Modal');
            if (modal) {
                modal.classList.remove('show');
                document.body.style.overflow = '';
            }
        }

        function switchModal(from, to) {
            hideModal(from);
            setTimeout(function() {
                showModal(to);
            }, 300);
        }

        // ========== 认证相关 ==========
        function checkAuth() {
            debug('检查登录状态...');
            if (!appState.supabase) {
                debug('Supabase 未初始化');
                updateUIForLoggedOut();
                return;
            }
            
            appState.supabase.auth.getSession().then(function(result) {
                debug('getSession 结果:' + JSON.stringify({
                    hasError: !!result.error,
                    hasSession: !!result.data.session
                }));
                
                if (result.error) {
                    debug('获取会话错误:' + result.error.message);
                    updateUIForLoggedOut();
                    return;
                }
                
                var session = result.data.session;
                if (session) {
                    appState.currentUser = session.user;
                    debug('用户已登录，ID:' + appState.currentUser.id);
                    updateUIForLoggedIn();
                    loadNotebooks();
                } else {
                    debug('用户未登录');
                    updateUIForLoggedOut();
                }
            }).catch(function(err) {
                debug('检查登录状态异常:' + err.message);
                updateUIForLoggedOut();
            });
        }

        function handleLogin() {
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value.trim();
            var btn = document.getElementById('doLoginBtn');

            if (!email || !password) {
                showToast('请填写邮箱和密码', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            debug('尝试登录，邮箱:' + email);

            appState.supabase.auth.signInWithPassword({
                email: email,
                password: password
            }).then(function(result) {
                debug('登录结果:' + JSON.stringify({
                    hasError: !!result.error,
                    hasUser: !!result.data.user
                }));
                
                if (result.error) throw result.error;
                
                appState.currentUser = result.data.user;
                showToast('登录成功！', 'success');
                hideModal('login');
                updateUIForLoggedIn();
                loadNotebooks();
                
                document.getElementById('loginEmail').value = '';
                document.getElementById('loginPassword').value = '';
            }).catch(function(err) {
                debug('登录错误:' + err.message);
                showToast('登录失败：' + getFriendlyError(err.message), 'error');
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = '登录';
            });
        }

        function handleRegister() {
            var username = document.getElementById('registerUsername').value.trim();
            var email = document.getElementById('registerEmail').value.trim();
            var password = document.getElementById('registerPassword').value.trim();
            var confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
            var btn = document.getElementById('doRegisterBtn');

            if (!username || username.length < 3 || username.length > 16) {
                showToast('用户名需 3-16 位字符', 'error');
                return;
            }
            if (!email || !isValidEmail(email)) {
                showToast('请输入有效邮箱', 'error');
                return;
            }
            if (!password || password.length < 6 || password.length > 16) {
                showToast('密码需 6-16 位字符', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showToast('两次密码不一致', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';
            debug('尝试注册，邮箱:' + email);

            appState.supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { username: username }
                }
            }).then(function(result) {
                debug('注册结果:' + JSON.stringify({
                    hasError: !!result.error,
                    hasUser: !!result.data.user
                }));
                
                if (result.error) throw result.error;

                if (result.data.user) {
                    showToast('注册成功！请查收邮箱验证', 'info');
                    hideModal('register');
                    
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerEmail').value = '';
                    document.getElementById('registerPassword').value = '';
                    document.getElementById('registerConfirmPassword').value = '';
                }
            }).catch(function(err) {
                debug('注册错误:' + err.message);
                showToast('注册失败：' + getFriendlyError(err.message), 'error');
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = '注册';
            });
        }

        function handleLogout() {
            if (!appState.supabase) return;
            
            appState.supabase.auth.signOut().then(function() {
                appState.currentUser = null;
                appState.currentNotebookId = null;
                appState.currentNoteId = null;
                showToast('已退出登录', 'info');
                updateUIForLoggedOut();
                clearContent();
                debug('已退出登录');
            }).catch(function(err) {
                showToast('退出失败', 'error');
            });
        }

        function updateUIForLoggedIn() {
            var username = appState.currentUser.user_metadata?.username || 
                          appState.currentUser.email?.split('@')[0] || '用户';
            document.getElementById('userActions').innerHTML = 
                '<span style="color:#8B4513;font-family:\'STKaiti\';margin-right:10px;">欢迎，' + 
                escapeHtml(username) + '</span>' +
                '<button class="btn btn-danger" id="logoutBtn">退出</button>';
            
            document.getElementById('newNotebookName').disabled = false;
            document.getElementById('createNotebookBtn').disabled = false;
            
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            debug('UI 更新为已登录状态');
        }

        function updateUIForLoggedOut() {
            document.getElementById('userActions').innerHTML = 
                '<button class="btn btn-primary" id="loginBtn2">登录</button>' +
                '<button class="btn btn-secondary" id="registerBtn2">注册</button>';
            
            document.getElementById('newNotebookName').disabled = true;
            document.getElementById('createNotebookBtn').disabled = true;
            
            document.getElementById('loginBtn2').addEventListener('click', function() {
                showModal('login');
            });
            document.getElementById('registerBtn2').addEventListener('click', function() {
                showModal('register');
            });
            debug('UI 更新为未登录状态');
        }

        // ========== 笔记集相关 ==========
        function loadNotebooks() {
            if (!appState.currentUser || !appState.supabase) {
                debug('加载笔记集：用户未登录或 Supabase 未初始化');
                return;
            }

            var list = document.getElementById('notebookList');
            list.innerHTML = '<div class="loading"></div>';

            debug('加载笔记集，用户 ID:' + appState.currentUser.id);

            appState.supabase
                .from('notebooks')
                .select('*')
                .eq('user_id', appState.currentUser.id)
                .order('created_at', { ascending: false })
                .then(function(result) {
                    debug('笔记集查询结果:' + JSON.stringify({
                        hasError: !!result.error,
                        dataLength: result.data ? result.data.length : 0,
                        error: result.error ? result.error.message : 'none'
                    }));
                    
                    if (result.error) throw result.error;

                    var data = result.data || [];
                    if (data.length === 0) {
                        list.innerHTML = '<li class="empty-state">暂无笔记集，请创建</li>';
                    } else {
                        var html = '';
                        for (var i = 0; i < data.length; i++) {
                            var nb = data[i];
                            var isActive = appState.currentNotebookId === nb.id ? 'active' : '';
                            html += '<li class="notebook-item ' + isActive + '" data-id="' + nb.id + '">' +
                                '<span class="notebook-name">' + escapeHtml(nb.name) + '</span>' +
                                '<div class="notebook-actions">' +
                                '<button class="btn btn-edit btn-notebook-edit" data-id="' + nb.id + '" data-name="' + escapeHtml(nb.name) + '">改</button>' +
                                '<button class="btn btn-danger btn-notebook-delete" data-id="' + nb.id + '">删</button>' +
                                '</div></li>';
                        }
                        list.innerHTML = html;
                        bindNotebookEvents();
                    }
                }).catch(function(err) {
                    debug('加载笔记集失败:' + err.message);
                    list.innerHTML = '<li class="empty-state" style="color:red">加载失败：' + getFriendlyError(err.message) + '</li>';
                });
        }

        function bindNotebookEvents() {
            var list = document.getElementById('notebookList');
            
            list.querySelectorAll('.notebook-item').forEach(function(item) {
                item.addEventListener('click', function() {
                    var id = this.getAttribute('data-id');
                    selectNotebook(id);
                });
            });
            
            list.querySelectorAll('.btn-notebook-edit').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var id = this.getAttribute('data-id');
                    var name = this.getAttribute('data-name');
                    editNotebook(id, name);
                });
            });
            
            list.querySelectorAll('.btn-notebook-delete').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var id = this.getAttribute('data-id');
                    deleteNotebook(id);
                });
            });
        }

        function createNotebook() {
            var input = document.getElementById('newNotebookName');
            var btn = document.getElementById('createNotebookBtn');
            var name = input.value.trim();

            if (!name) {
                showToast('请输入笔记集名称', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '创建中...';

            debug('创建笔记集，名称:' + name + ', 用户 ID:' + appState.currentUser.id);

            appState.supabase
                .from('notebooks')
                .insert([{
                    name: name,
                    user_id: appState.currentUser.id
                }])
                .then(function(result) {
                    debug('创建笔记集结果:' + JSON.stringify({
                        hasError: !!result.error,
                        error: result.error ? result.error.message : 'none',
                        status: result.status
                    }));
                    
                    if (result.error) throw result.error;
                    
                    input.value = '';
                    showToast('创建成功', 'success');
                    loadNotebooks();
                }).catch(function(err) {
                    debug('创建笔记集失败:' + err.message);
                    showToast('创建失败：' + getFriendlyError(err.message), 'error');
                }).finally(function() {
                    btn.disabled = false;
                    btn.textContent = '+ 创建';
                });
        }

        function selectNotebook(notebookId) {
            appState.currentNotebookId = notebookId;
            appState.currentNoteId = null;
            
            document.querySelectorAll('.notebook-item').forEach(function(item) {
                var isActive = item.getAttribute('data-id') === notebookId;
                item.classList.toggle('active', isActive);
            });

            loadNotes(notebookId);
        }

        function loadNotes(notebookId) {
    if (!appState.supabase) return;

    var content = document.getElementById('contentArea');
    content.innerHTML = '<div class="loading"></div>';

    debug('加载笔记，用户 ID:' + appState.currentUser.id);

    // 先获取笔记集名称
    appState.supabase
        .from('notebooks')
        .select('name')
        .eq('id', notebookId)
        .single()
        .then(function(result) {
            if (result.error) throw result.error;
            var notebook = result.data; // ✅ 保存 notebook 对象

            // 再获取该笔记集下的所有笔记
            return appState.supabase
                .from('notes')
                .select('*')
                .eq('notebook_id', notebookId)
                .order('updated_at', { ascending: false })
                .then(function(notesResult) {
                    if (notesResult.error) throw notesResult.error;
                    var notes = notesResult.data || [];

                    // ✅ 现在可以安全使用 notebook.name
                    var notesHtml = '';
                    if (notes.length === 0) {
                        notesHtml = '<div class="empty-state" style="grid-column:1/-1">暂无笔记</div>';
                    } else {
                        for (var i = 0; i < notes.length; i++) {
                            var note = notes[i];
                            var contentText = (note.content || '').replace(/<[^>]*>/g, '').substring(0, 100);
                            notesHtml += '<div class="note-card" data-id="' + note.id + '">' +
                                '<h4>' + escapeHtml(note.title || '无标题') + '</h4>' +
                                '<p>' + escapeHtml(contentText) + '</p>' +
                                '<div class="note-time">' + formatDate(note.updated_at) + '</div>' +
                                '<div class="note-actions">' +
                                '<button class="btn btn-edit btn-note-edit" data-id="' + note.id + '">编辑</button>' +
                                '<button class="btn btn-danger btn-note-delete" data-id="' + note.id + '">删除</button>' +
                                '</div></div>';
                        }
                    }

                    content.innerHTML = 
                        '<div class="note-header">' +
                        '<h3>' + escapeHtml(notebook.name) + '</h3>' +  // ✅ 正确引用
                        '<button class="btn btn-primary" id="createNoteBtn">+ 新建笔记</button>' +
                        '</div>' +
                        '<div class="note-list">' + notesHtml + '</div>';

                    bindNoteEvents();
                });
        })
        .catch(function(err) {
            debug('加载笔记失败:' + err.message);
            content.innerHTML = '<div class="empty-state" style="color:red">加载失败：' + getFriendlyError(err.message) + '</div>';
        });
}

        function bindNoteEvents() {
            var content = document.getElementById('contentArea');
            var notebookId = appState.currentNotebookId;
            
            var createBtn = document.getElementById('createNoteBtn');
            if (createBtn) createBtn.addEventListener('click', createNote);
            
            content.querySelectorAll('.note-card').forEach(function(card) {
                card.addEventListener('click', function(e) {
                    if (!e.target.classList.contains('btn')) {
                        editNote(this.getAttribute('data-id'));
                    }
                });
            });
            
            content.querySelectorAll('.btn-note-edit').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    editNote(this.getAttribute('data-id'));
                });
            });
            
            content.querySelectorAll('.btn-note-delete').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deleteNote(this.getAttribute('data-id'));
                });
            });
        }

        function createNote() {
            appState.currentNoteId = null;
            showEditor('', '');
        }

        function editNote(noteId) {
            if (!appState.supabase) return;
            appState.supabase
                .from('notes')
                .select('title, content')
                .eq('id', noteId)
                .single()
                .then(function(result) {
                    if (result.error) throw result.error;
                    appState.currentNoteId = noteId;
                    showEditor(result.data.title || '', result.data.content || '');
                }).catch(function(err) {
                    showToast('加载笔记失败', 'error');
                });
        }

        function showEditor(title, content) {
            var contentArea = document.getElementById('contentArea');
            var isEdit = appState.currentNoteId ? '编辑笔记' : '新建笔记';
            var notebookId = appState.currentNotebookId;
            
            contentArea.innerHTML = 
                '<div class="note-header">' +
                '<h3>' + isEdit + '</h3>' +
                '<div>' +
                '<button class="btn btn-primary" id="saveNoteBtn">保存</button>' +
                '<button class="btn btn-secondary" id="cancelNoteBtn">取消</button>' +
                '</div></div>' +
                '<input type="text" class="editor-title" id="noteTitle" placeholder="标题" value="' + escapeHtml(title) + '">' +
                '<div class="editor-toolbar">' +
                '<button class="toolbar-btn" id="btnBold"><b>B</b></button>' +
                '<button class="toolbar-btn" id="btnItalic"><i>I</i></button>' +
                '<button class="toolbar-btn" id="btnUnderline"><u>U</u></button>' +
                '<button class="toolbar-btn" id="btnLeft">左</button>' +
                '<button class="toolbar-btn" id="btnCenter">中</button>' +
                '<button class="toolbar-btn" id="btnRight">右</button>' +
                '<input type="color" id="fontColor" style="width:30px;height:30px;border:none;">' +
                '<input type="file" id="imageUpload" accept="image/*" style="display:none">' +
                '<button class="toolbar-btn" id="btnImage">图</button>' +
                '</div>' +
                '<div class="editor-content" id="noteContent" contenteditable="true">' + content + '</div>';

            bindEditorEvents(notebookId);
        }

        function bindEditorEvents(notebookId) {
            document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
            document.getElementById('cancelNoteBtn').addEventListener('click', function() {
                loadNotes(notebookId);
            });
            document.getElementById('btnBold').addEventListener('click', function() { execCmd('bold'); });
            document.getElementById('btnItalic').addEventListener('click', function() { execCmd('italic'); });
            document.getElementById('btnUnderline').addEventListener('click', function() { execCmd('underline'); });
            document.getElementById('btnLeft').addEventListener('click', function() { execCmd('justifyLeft'); });
            document.getElementById('btnCenter').addEventListener('click', function() { execCmd('justifyCenter'); });
            document.getElementById('btnRight').addEventListener('click', function() { execCmd('justifyRight'); });
            document.getElementById('fontColor').addEventListener('change', function() {
                execCmd('foreColor', this.value);
            });
            document.getElementById('btnImage').addEventListener('click', function() {
                document.getElementById('imageUpload').click();
            });
            document.getElementById('imageUpload').addEventListener('change', function() {
                insertImage(this);
            });
        }

        function execCmd(command, value) {
            document.execCommand(command, false, value);
            document.getElementById('noteContent').focus();
        }

        function insertImage(input) {
            var file = input.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = document.createElement('img');
                img.src = e.target.result;
                img.style.maxWidth = '100%';
                var content = document.getElementById('noteContent');
                content.focus();
                var selection = window.getSelection();
                if (selection.rangeCount > 0) {
                    selection.getRangeAt(0).insertNode(img);
                } else {
                    content.appendChild(img);
                }
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        function saveNote() {
            if (!appState.supabase) return;
            var title = document.getElementById('noteTitle').value.trim() || '无标题';
            var content = document.getElementById('noteContent').innerHTML;
            var btn = document.getElementById('saveNoteBtn');

            if (!content.trim()) {
                showToast('内容不能为空', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '保存中...';
            debug('保存笔记，标题:' + title);

            var promise;
            if (appState.currentNoteId) {
                promise = appState.supabase
                    .from('notes')
                    .update({ title: title, content: content, updated_at: new Date().toISOString() })
                    .eq('id', appState.currentNoteId)
                    .eq('user_id', appState.currentUser.id);
            } else {
                promise = appState.supabase
                    .from('notes')
                    .insert([{
                        title: title,
                        content: content,
                        notebook_id: appState.currentNotebookId,
                        user_id: appState.currentUser.id
                    }]);
            }

            promise.then(function(result) {
                debug('保存结果:' + JSON.stringify({
                    hasError: !!result.error,
                    error: result.error ? result.error.message : 'none'
                }));
                if (result.error) throw result.error;
                showToast(appState.currentNoteId ? '更新成功' : '创建成功', 'success');
                loadNotes(appState.currentNotebookId);
            }).catch(function(err) {
                debug('保存失败:' + err.message);
                showToast('保存失败：' + getFriendlyError(err.message), 'error');
            }).finally(function() {
                btn.disabled = false;
                btn.textContent = '保存';
            });
        }

        function deleteNote(noteId) {
            if (!confirm('确定删除此笔记？')) return;
            if (!appState.supabase) return;
            appState.supabase
                .from('notes')
                .delete()
                .eq('id', noteId)
                .eq('user_id', appState.currentUser.id)
                .then(function(result) {
                    if (result.error) throw result.error;
                    showToast('删除成功', 'success');
                    loadNotes(appState.currentNotebookId);
                }).catch(function(err) {
                    showToast('删除失败', 'error');
                });
        }

        function editNotebook(notebookId, oldName) {
            var newName = prompt('修改笔记集名称:', oldName);
            if (!newName || newName === oldName) return;
            appState.supabase
                .from('notebooks')
                .update({ name: newName, updated_at: new Date().toISOString() })
                .eq('id', notebookId)
                .eq('user_id', appState.currentUser.id)
                .then(function(result) {
                    if (result.error) throw result.error;
                    showToast('修改成功', 'success');
                    loadNotebooks();
                }).catch(function(err) {
                    showToast('修改失败', 'error');
                });
        }

        function deleteNotebook(notebookId) {
            if (!confirm('确定删除？此操作将删除该笔记集下所有笔记！')) return;
            if (!appState.supabase) return;
            appState.supabase
                .from('notes')
                .delete()
                .eq('notebook_id', notebookId)
                .eq('user_id', appState.currentUser.id)
                .then(function() {
                    return appState.supabase
                        .from('notebooks')
                        .delete()
                        .eq('id', notebookId)
                        .eq('user_id', appState.currentUser.id);
                }).then(function(result) {
                    if (result.error) throw result.error;
                    if (appState.currentNotebookId === notebookId) {
                        appState.currentNotebookId = null;
                        clearContent();
                    }
                    showToast('删除成功', 'success');
                    loadNotebooks();
                }).catch(function(err) {
                    showToast('删除失败', 'error');
                });
        }

        function clearContent() {
            document.getElementById('contentArea').innerHTML = 
                '<div class="empty-state">' +
                '<h3>请选择或创建笔记集</h3>' +
                '<p>登录后即可开始创作</p>' +
                '</div>';
        }

        // ========== 事件绑定 ==========
        function bindEvents() {
            document.getElementById('loginBtn').addEventListener('click', function() { showModal('login'); });
            document.getElementById('registerBtn').addEventListener('click', function() { showModal('register'); });
            document.getElementById('createNotebookBtn').addEventListener('click', createNotebook);
            document.getElementById('newNotebookName').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') createNotebook();
            });
            document.getElementById('loginPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('registerConfirmPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleRegister();
            });
            document.getElementById('closeLoginBtn').addEventListener('click', function() { hideModal('login'); });
            document.getElementById('closeRegisterBtn').addEventListener('click', function() { hideModal('register'); });
            document.getElementById('cancelLoginBtn').addEventListener('click', function() { hideModal('login'); });
            document.getElementById('cancelRegisterBtn').addEventListener('click', function() { hideModal('register'); });
            document.getElementById('toRegisterLink').addEventListener('click', function() { switchModal('login', 'register'); });
            document.getElementById('toLoginLink').addEventListener('click', function() { switchModal('register', 'login'); });
            document.getElementById('doLoginBtn').addEventListener('click', handleLogin);
            document.getElementById('doRegisterBtn').addEventListener('click', handleRegister);
            document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) {
                        overlay.classList.remove('show');
                        document.body.style.overflow = '';
                    }
                });
            });
        }

        // ========== 初始化 ==========
        function init() {
            debug('=== 应用初始化开始 ===');
            
            if (typeof window.supabase === 'undefined') {
                debug('Supabase SDK 未加载');
                showToast('系统加载失败，请刷新页面', 'error');
                return;
            }
            
            appState.supabase = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
            debug('Supabase 客户端初始化成功');
            
            bindEvents();
            checkAuth();
            
            debug('=== 应用初始化完成 ===');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
